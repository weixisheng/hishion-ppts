<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 200" width="220" height="200" role="img" aria-label="delivery loop">
  <defs>
    <linearGradient id="lp-blob" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#eef3ff"/><stop offset="1" stop-color="#e1e9ff"/></linearGradient>
    <linearGradient id="lp-arc" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#3b6cff"/><stop offset="1" stop-color="#7a5cff"/></linearGradient>
    <filter id="lp-sh" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#26336a" flood-opacity="0.15"/></filter>
  </defs>
  <rect x="8" y="8" width="204" height="184" rx="24" fill="url(#lp-blob)" stroke="#dde6fa" stroke-width="1.5"/>
  <circle cx="110" cy="100" r="62" fill="none" stroke="#d7e0fb" stroke-width="10"/>
  <g>
    <circle cx="110" cy="100" r="62" fill="none" stroke="url(#lp-arc)" stroke-width="10" stroke-linecap="round" stroke-dasharray="120 270"/>
    <animateTransform attributeName="transform" type="rotate" from="0 110 100" to="360 110 100" dur="4.6s" repeatCount="indefinite"/>
  </g>
  <g filter="url(#lp-sh)">
    <rect x="90" y="26" width="40" height="28" rx="7" fill="#ffffff"/>
    <rect x="150" y="86" width="40" height="28" rx="7" fill="#ffffff"/>
    <rect x="90" y="146" width="40" height="28" rx="7" fill="#ffffff"/>
    <rect x="30" y="86" width="40" height="28" rx="7" fill="#ffffff"/>
  </g>
  <g>
    <rect x="97" y="33" width="26" height="4" rx="2" fill="#3b6cff"/>
    <rect x="97" y="41" width="17" height="8" rx="2" fill="#9fb4ff"/>
  </g>
  <g fill="#7a5cff">
    <rect x="158" y="92" width="24" height="5" rx="2"/>
    <rect x="158" y="101" width="24" height="5" rx="2"/>
  </g>
  <g>
    <circle cx="110" cy="160" r="8" fill="none" stroke="#3b6cff" stroke-width="3"/>
    <circle cx="110" cy="160" r="2.5" fill="#3b6cff"/>
  </g>
  <g fill="#7a5cff">
    <circle cx="46" cy="101" r="5"/>
    <circle cx="54" cy="98" r="6.5"/>
    <rect x="42" y="101" width="18" height="6" rx="3"/>
  </g>
  <g>
    <circle cx="110" cy="38" r="6" fill="#3b6cff"/>
    <animateTransform attributeName="transform" type="rotate" from="0 110 100" to="360 110 100" dur="5s" repeatCount="indefinite"/>
  </g>
</svg>
