<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180" width="240" height="180" role="img" aria-label="career growth path">
  <defs>
    <linearGradient id="gr-blob" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#eef3ff"/><stop offset="1" stop-color="#e1e9ff"/></linearGradient>
    <linearGradient id="gr-bar" x1="0" y1="1" x2="0" y2="0"><stop offset="0" stop-color="#3b6cff"/><stop offset="1" stop-color="#7a5cff"/></linearGradient>
    <filter id="gr-sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#26336a" flood-opacity="0.14"/></filter>
  </defs>
  <rect x="8" y="8" width="224" height="164" rx="22" fill="url(#gr-blob)" stroke="#dde6fa" stroke-width="1.5"/>
  <line x1="40" y1="150" x2="200" y2="150" stroke="#cdd9f7" stroke-width="3" stroke-linecap="round"/>
