    <rect x="100" y="90" width="40" height="60" rx="6" fill="#6f86ff"/>
    <rect x="150" y="60" width="40" height="90" rx="6" fill="url(#gr-bar)"/>
  </g>
  <g stroke="#ffffff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M65 129 l-5 4 l5 4 M75 129 l5 4 l-5 4"/>
    <path d="M111 108 h18 M111 116 h18 M111 124 h18"/>
  </g>
  <circle cx="170" cy="94" r="8" fill="none" stroke="#ffffff" stroke-width="3"/>
  <circle cx="170" cy="94" r="2.5" fill="#ffffff"/>
  <g>
    <line x1="170" y1="60" x2="170" y2="38" stroke="#2b3350" stroke-width="3" stroke-linecap="round"/>
    <path d="M170 40 L192 46 L170 52 Z" fill="#f5a524">
      <animate attributeName="d" values="M170 40 L192 46 L170 52 Z;M170 40 L189 50 L170 52 Z;M170 40 L192 46 L170 52 Z" dur="2s" repeatCount="indefinite"/>
    </path>
  </g>
  <path d="M70 116 L120 90 L170 60" fill="none" stroke="#7a5cff" stroke-width="2.5" stroke-dasharray="3 5" opacity="0.5"/>
  <circle r="5.5" fill="#7a5cff">
    <animateMotion path="M70 116 L120 90 L170 60" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.12;0.85;1" dur="3s" repeatCount="indefinite"/>
