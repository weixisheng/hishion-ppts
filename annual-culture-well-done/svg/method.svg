<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180" width="240" height="180" role="img" aria-label="three step method">
  <defs>
    <linearGradient id="mt-blob" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#eef3ff"/><stop offset="1" stop-color="#e1e9ff"/></linearGradient>
    <radialGradient id="mt-bulb" cx="0.5" cy="0.4" r="0.7"><stop offset="0" stop-color="#fff1bf"/><stop offset="1" stop-color="#f5c43a"/></radialGradient>
    <filter id="mt-sh" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#26336a" flood-opacity="0.14"/></filter>
  </defs>
  <rect x="8" y="8" width="224" height="164" rx="22" fill="url(#mt-blob)" stroke="#dde6fa" stroke-width="1.5"/>
  <g stroke="#f5c43a" stroke-width="3" stroke-linecap="round">
    <line x1="120" y1="30" x2="120" y2="22"/>
    <line x1="99" y1="39" x2="93.4" y2="33.4"/>
    <line x1="141" y1="39" x2="146.6" y2="33.4"/>
    <line x1="91" y1="52" x2="83.1" y2="50"/>
    <line x1="149" y1="52" x2="156.9" y2="50"/>
    <animate attributeName="opacity" values="0.35;1;0.35" dur="2.4s" repeatCount="indefinite"/>
  </g>
  <circle cx="120" cy="62" r="26" fill="url(#mt-bulb)"/>
  <path d="M110 66 L115 56 L120 66 L125 56 L130 66" fill="none" stroke="#e8941a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="111" y="86" width="18" height="9" rx="2" fill="#c9a227"/>
  <rect x="114" y="95" width="12" height="6" rx="2" fill="#b9901f"/>
  <line x1="120" y1="104" x2="120" y2="112" stroke="#9fb4ff" stroke-width="2.5" stroke-dasharray="2 4"/>
  <line x1="66" y1="132" x2="174" y2="132" stroke="#cdd9f7" stroke-width="3" stroke-linecap="round"/>
  <g filter="url(#mt-sh)">
    <circle cx="66" cy="132" r="18" fill="#ffffff"/>
    <circle cx="120" cy="132" r="18" fill="#ffffff"/>
    <circle cx="174" cy="132" r="18" fill="#ffffff"/>
  </g>
  <g font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" text-anchor="middle">
    <text x="66" y="139" fill="#3b6cff">1</text>
    <text x="120" y="139" fill="#5a6bff">2</text>
    <text x="174" y="139" fill="#7a5cff">3</text>
  </g>
  <circle r="5" fill="#3b6cff">
    <animateMotion path="M66 132 H174" dur="2.6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="2.6s" repeatCount="indefinite"/>
  </circle>
</svg>
